name: Trigger Automation Regression

on:
  page_build:

jobs:
  ping-automation-suite:
    runs-on: ubuntu-latest
    # FIX: Using github.event.status satisfies the linter and removes the warning
    if: github.event.build.status == 'built'
    
    steps:
      - name: Send Remote Dispatch to SwiftShop-Automation Repo 📡
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.AUTOMATION_RENAME_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository_owner }}/SwiftShop-Automation/dispatches \
            -d '{"event_type": "run-regression-suite"}'
